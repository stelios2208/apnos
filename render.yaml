services:
  - type: web
    name: apnos
    runtime: node
    plan: free
    buildCommand: npm install && NITRO_PRESET=node-server npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
